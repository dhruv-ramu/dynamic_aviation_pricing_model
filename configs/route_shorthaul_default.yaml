# Default parameters for a single short-haul U.S. domestic leg (~300–800 miles).
# Edit values here; base_config.yaml can extend this file and override selectively.

route_origin: "SEA"
route_destination: "SFO"
route_distance_miles: 450

booking_horizon_days: 60
capacity: 180

# Reference fare and ordered buckets (high to low is conventional; engine uses first bucket for static policy).
base_fare: 140.0
fare_buckets: [220.0, 189.0, 159.0, 139.0, 119.0]

# Demand / segment placeholders for future phases (used by config validation only today).
business_share_late: 0.35
leisure_elasticity: 1.4
business_elasticity: 0.6

# Operations / revenue placeholders (no-show logic not simulated in Phase 1).
no_show_mean: 0.10
overbooking_limit_pct: 0.03

ancillary_mean: 30.0

# Cost model inputs (CASM ex-fuel style $ per ASM; fixed cost per departure).
casm_ex: 0.14
fixed_flight_cost: 7000.0

# competitor_mode: reserved for later ("none", "mirror", etc.)
competitor_mode: "none"

rng_seed: 42
