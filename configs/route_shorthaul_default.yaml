# Default parameters for a single short-haul U.S. domestic leg (~300–800 miles).
# Edit values here; base_config.yaml can extend this file and override selectively.

route_origin: "SEA"
route_destination: "SFO"
route_distance_miles: 450

booking_horizon_days: 60
capacity: 180

# Reference fare and fare ladder (any order; internally sorted with index 0 = cheapest).
base_fare: 140.0
fare_buckets: [220.0, 189.0, 159.0, 139.0, 119.0]
# Optional YAML alias overriding fare_buckets if set:
# fare_bucket_values: [119, 139, 159, 189, 220]

# --- Pricing policies (static | rule_based | dynamic) ---
pricing_policy: "static"
early_window_days: 45
late_window_days: 14
low_load_factor_threshold: 0.35
high_load_factor_threshold: 0.85
pace_gap_raise_threshold: 6.0
pace_gap_lower_threshold: -6.0
competitor_base_offset: -12.0
competitor_noise_std: 3.0
# Competitor nudge (rule_based + dynamic). Higher threshold / lower strength = less matching.
competitor_match_threshold: 25.0
competitor_response_strength: 0.35
# static_bucket_index: null  # default = most expensive bucket (legacy high fare)

# --- Dynamic pricing (stateful score controller; see DynamicPricingPolicy) ---
# null = start one below max fare bucket; else set explicit ladder index
# dynamic_initial_bucket_index: null
dynamic_weight_pace: 0.88
dynamic_weight_scarcity: 1.22
dynamic_weight_demand_pressure: 1.52
# Quantize core_net (pace+scarcity+demand only): strong_raise / mild_raise / strong_lower
dynamic_score_strong_raise: 1.12
dynamic_score_mild_raise: 0.36
dynamic_score_strong_lower: -0.74
dynamic_bucket_change_deadband: 0.26
dynamic_strong_raise_allows_two_steps: true
# Two-step up requires pace ratio, seat fill, or demand score to clear one of these bars
dynamic_two_step_pace_ratio: 1.07
dynamic_two_step_scarcity_fill: 0.82
dynamic_two_step_demand_score: 0.72
dynamic_pace_late_dampen: 0.30
dynamic_scarcity_fill_ratio_1: 0.68
dynamic_scarcity_fill_ratio_2: 0.84
# expected_remaining_demand / physical_seats_left vs this neutral ratio -> raise pressure
dynamic_demand_pressure_neutral_ratio: 1.02
dynamic_demand_ratio_score_scale: 0.92
dynamic_competitor_disable_fill_ratio: 0.78
dynamic_competitor_late_ignore_days: 12
dynamic_competitor_ignore_if_ahead_of_pace: true
dynamic_late_floor_days_until_departure: 10
dynamic_min_bucket_index_late: 1
# Stronger floor inside late_window_days (see late_window_days above)
dynamic_late_window_min_bucket_index: 2
# 0 = no cooldown between bucket changes
dynamic_min_days_between_bucket_changes: 0
# dynamic_policy_debug: false

# Legacy elasticity placeholders (reserved for future pricing/demand calibration).
business_share_late: 0.35
leisure_elasticity: 1.4
business_elasticity: 0.6

# --- Phase 2: stochastic demand (booking curve, arrivals, segment mix, WTP, conversion) ---
# Total expected shopper arrivals across the horizon (not equal to seats sold; conversion + capacity bind).
expected_total_demand: 210.0
demand_multiplier: 1.0

# booking_curve: logistic intensity in days-until-departure space (see booking_curve.py).
booking_curve_type: "logistic"
booking_curve_midpoint: 18.0
booking_curve_steepness: 0.45

# Segment mix (calibrated 2026): booking intensity rises late while mix was also business-heavy late,
# which stacked with high fares to skew accepted bookings. Lower late share, softer slope, and a
# lower midpoint keep business-tilted *arrivals* concentrated closer to departure only.
early_business_share: 0.10
late_business_share: 0.42
segment_transition_midpoint_days: 14.0
segment_transition_steepness: 0.24

# WTP (calibrated 2026): leisure mean was too low vs typical quoted fares (~$159–$220), so threshold
# conversion rejected most leisure draws. Raised leisure mean (still < business) and trimmed premium.
leisure_wtp_mean: 208.0
leisure_wtp_sigma: 52.0
business_wtp_mean: 315.0
business_wtp_sigma: 88.0

# If false, daily arrivals use round(expected lambda) instead of Poisson draws (tests / debugging).
demand_stochastic: true

# --- Departure-day realism (no-shows, overbooking cap, denied boarding economics) ---
no_show_mean: 0.10
overbooking_enabled: true
overbooking_limit_pct: 0.03
denied_boarding_delay_hours: 2.5
denied_boarding_compensation_multiplier: 4.0
denied_boarding_compensation_cap: 2150.0
goodwill_penalty_per_bumped_passenger: 150.0

ancillary_mean: 30.0

# Cost model inputs (CASM ex-fuel style $ per ASM; fixed cost per departure).
casm_ex: 0.14
fixed_flight_cost: 7000.0

# competitor_mode: none | static | reactive (reactive uses previous-day our fare).
competitor_mode: "static"

rng_seed: 42
